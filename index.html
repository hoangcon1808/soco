<!DOCTYPE html>
<html lang="vi" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socolive Live Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 font-sans">

    <div class="max-w-7xl mx-auto">
        <header class="mb-8 flex flex-col md:flex-row justify-between items-center border-b border-gray-800 pb-6 gap-4">
            <div>
                <h1 class="text-2xl md:text-3xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 uppercase">
                    Hệ Thống Link Trực Tiếp Socolive
                </h1>
                <p class="text-gray-400 mt-1 text-sm flex items-center gap-2" id="last-update">
                    <span class="h-2 w-2 rounded-full bg-emerald-500 animate-pulse"></span> Đang tải dữ liệu thời gian thực...
                </p>
            </div>
            
            <div class="w-full md:w-80">
                <input type="text" id="search-input" placeholder="Tìm tên đội, giải đấu, BLV..." 
                       class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-sm text-white placeholder-gray-400 focus:outline-none focus:border-cyan-500 transition">
            </div>
        </header>

        <div id="loading" class="flex flex-col items-center justify-center my-20 gap-3">
            <div class="animate-spin rounded-full h-10 w-10 border-2 border-cyan-500 border-t-transparent"></div>
            <p class="text-gray-400 text-sm">Đang nạp danh sách trận đấu...</p>
        </div>

        <div id="error-message" class="hidden text-center bg-red-950/50 border border-red-800 text-red-400 px-6 py-4 rounded-xl max-w-xl mx-auto my-12">
            Không tìm thấy tệp dữ liệu `streams.json`. Hãy chắc chắn rằng GitHub Actions đã hoàn thành lượt chạy đầu tiên để khởi tạo dữ liệu!
        </div>

        <div id="streams-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 hidden">
            </div>
    </div>

    <script>
        let allStreams = [];

        async function fetchLiveStreams() {
            try {
                // Fetch tệp dữ liệu chống cơ chế ép cache của trình duyệt bằng timestamp
                const response = await fetch('streams.json?t=' + new Date().getTime());
                if (!response.ok) throw new Error("Missing json source");
                
                allStreams = await response.json();
                
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('last-update').innerHTML = `<span class="h-2 w-2 rounded-full bg-emerald-500 animate-pulse"></span> Đồng bộ tự động: ${new Date().toLocaleString('vi-VN')}`;
                
                if (allStreams.length === 0) {
                    displayNoData();
                    return;
                }

                renderStreams(allStreams);
                
                // Lắng nghe sự kiện gõ tìm kiếm
                document.getElementById('search-input').addEventListener('input', handleSearch);

            } catch (error) {
                console.error(error);
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('error-message').classList.remove('hidden');
            }
        }

        function renderStreams(streams) {
            const container = document.getElementById('streams-container');
            container.innerHTML = '';
            
            if(streams.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center text-gray-500 py-12">Không tìm thấy trận đấu nào khớp với từ khóa tìm kiếm.</div>`;
                return;
            }

            container.classList.remove('hidden');

            streams.forEach(item => {
                const card = document.createElement('div');
                card.className = "bg-slate-900 border border-slate-800 rounded-xl p-5 hover:border-slate-700 transition duration-200 flex flex-col justify-between";

                // Kiểm tra liên kết hợp lệ
                const hdLink = item.urls.hd_m3u8 || item.urls.m3u8;
                const sdLink = item.urls.m3u8;

                let actionButtons = '';
                if (hdLink) {
                    actionButtons += `
                        <div class="grid grid-cols-5 gap-2 mt-4">
                            <a href="${hdLink}" target="_blank" class="col-span-4 text-center bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-600 hover:to-blue-700 text-white font-medium text-xs py-2.5 px-3 rounded-lg transition flex items-center justify-center gap-1">
                                ⚡ Xem Ngay (HLS)
                            </a>
                            <button onclick="copyToClipboard('${hdLink}', this)" class="bg-slate-800 hover:bg-slate-700 text-gray-300 rounded-lg text-xs font-medium transition focus:outline-none" title="Copy liên kết phát M3U8">
                                📋
                            </button>
                        </div>
                    `;
                } else {
                    actionButtons = `<p class="text-xs text-amber-500/80 italic mt-4 text-center bg-amber-950/20 py-2 rounded-lg border border-amber-900/30">Luồng phát hiện tại chưa cấu hình URL phát trực tiếp</p>`;
                }

                card.innerHTML = `
                    <div>
                        <div class="flex justify-between items-center mb-3">
                            <span class="bg-slate-800 text-cyan-400 text-[10px] font-bold uppercase tracking-wider px-2.5 py-1 rounded-md border border-slate-700">${item.category}</span>
                            <span class="text-[11px] text-gray-500 font-mono">ID: ${item.room_id}</span>
                        </div>
                        <h3 class="text-base font-bold text-slate-100 leading-snug mb-2 hover:text-cyan-400 transition cursor-pointer">${item.match}</h3>
                    </div>
                    <div>
                        <div class="text-xs text-gray-400 flex items-center gap-1.5 bg-slate-950/40 p-2 rounded-lg border border-slate-800/60 my-2">
                            <span>🎙️ BLV:</span>
                            <span class="font-semibold text-slate-200">${item.streamer}</span>
                        </div>
                        ${actionButtons}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function handleSearch(e) {
            const keyword = e.target.value.toLowerCase().trim();
            const filtered = allStreams.filter(item => 
                item.match.toLowerCase().includes(keyword) || 
                item.streamer.toLowerCase().includes(keyword) || 
                item.category.toLowerCase().includes(keyword)
            );
            renderStreams(filtered);
        }

        function displayNoData() {
            const container = document.getElementById('streams-container');
            container.innerHTML = `<div class="col-span-full text-center text-gray-400 py-12">Hiện tại không có trận đấu trực tuyến nào được tìm thấy từ API.</div>`;
            container.classList.remove('hidden');
        }

        function copyToClipboard(text, buttonElement) {
            navigator.clipboard.writeText(text).then(() => {
                const originalText = buttonElement.innerHTML;
                buttonElement.innerHTML = '✔';
                buttonElement.classList.remove('bg-slate-800');
                buttonElement.classList.add('bg-emerald-600', 'text-white');
                setTimeout(() => {
                    buttonElement.innerHTML = originalText;
                    buttonElement.classList.remove('bg-emerald-600', 'text-white');
                    buttonElement.classList.add('bg-slate-800');
                }, 1500);
            }).catch(err => {
                alert('Không thể sao chép liên kết, vui lòng thử lại thủ công.');
            });
        }

        // Khởi chạy hệ thống nạp luồng dữ liệu tự động
        fetchLiveStreams();
    </script>
</body>
</html>
