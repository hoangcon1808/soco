name: Auto Scrape Live Streams

on:
  schedule:
    - cron: '0,30 * * * *'
  workflow_dispatch:

jobs:
  update-streams:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install curl_cffi

      - name: Run Scraper to Generate JSON
        run: python scraper.py -o streams.json

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add streams.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update streams.json" && git push)
